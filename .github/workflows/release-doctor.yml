name: Release Doctor
on:
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  release_doctor:
    name: release doctor
    runs-on: ubuntu-latest
    if: github.repository == 'team-telnyx/telnyx-php' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch' || startsWith(github.head_ref, 'release-please') || github.head_ref == 'next')

    steps:
      - uses: actions/checkout@v6

      - name: Verify Packagist webhook
        run: |
          echo "Packagist publishing is handled via GitHub webhook auto-sync."
          echo "No API tokens or manual publish steps are required."
          echo "Ensure the Packagist webhook is active at:"
          echo "  https://github.com/team-telnyx/telnyx-php/settings/hooks"
