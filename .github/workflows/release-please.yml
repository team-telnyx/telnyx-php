name: Release Please

# Thin caller: the actual release logic is single-sourced in
# telnyx-sdk-config/.github/workflows/sdk-release-please.yml (shared by all
# SDK prod repos) so fixes land once instead of being hand-copied 7 times.

on:
  push:
    branches:
      - next
      - master
  # Manual retrigger (e.g. after a transient reusable-workflow failure).
  workflow_dispatch: {}

jobs:
  release-please:
    uses: team-telnyx/telnyx-sdk-config/.github/workflows/sdk-release-please.yml@master
    with:
      release_branch: master
      version_files: CHANGELOG.md composer.json src/Version.php .release-please-manifest.json
    secrets: inherit
