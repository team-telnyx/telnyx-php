name: Promote to Prod

# Promotes generated SDK code from this staging repo to the production repo.
#
# Flow:
#   1. stlc-generate.yml pushes generated code to staging main (unchanged)
#   2. This workflow triggers on push to main
#   3. Clones the prod repo, checks out its `next` branch
#   4. Syncs the staging tree into prod's `next` (full replacement)
#   5. Restores prod-owned files that differ from staging
#   6. Commits with a Release-As footer and pushes to `next`
#   7. Prod's release-please.yml (triggered on `next` push) creates a release PR
#      → auto-merge → tag → Packagist auto-updates via GitHub webhook
#
# This replaces the Stainless SaaS mirror that previously synced
# stainless-sdks/telnyx-php → team-telnyx/telnyx-php.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: promote-to-prod
  cancel-in-progress: false

jobs:
  promote:
    if: github.repository == 'team-telnyx/telnyx-php-staging'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout staging
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.SDK_WRITE_TOKEN }}

      - name: Read Release-As version from staging history
        id: version
        run: |
          VERSION=""
          # The stlc-generate.yml injects a "Release-As: X.Y.Z" footer
          # into the generate commit. Find the latest one in main history.
          for commit in $(git rev-list HEAD --max-count=50); do
            BODY=$(git log -1 --format=%b "$commit")
            RA=$(echo "$BODY" | grep -oP 'Release-As:\s*\K[\d.]+' || true)
            if [ -n "$RA" ]; then
              VERSION="$RA"
              break
            fi
          done

          # Fallback: read from manifest
          if [ -z "$VERSION" ]; then
            VERSION=$(jq -r '."." // empty' .release-please-manifest.json 2>/dev/null || true)
          fi

          # Fallback: read from src/Version.php
          if [ -z "$VERSION" ]; then
            VERSION=$(grep 'VERSION' src/Version.php | head -1 | sed "s/.*'\(.*\)'.*/\1/" || true)
          fi

          if [ -z "$VERSION" ]; then
            echo "::warning::Could not determine version; skipping promote"
            echo "has_version=false" >> "$GITHUB_OUTPUT"
          else
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "has_version=true" >> "$GITHUB_OUTPUT"
            echo "Next version: $VERSION"
          fi

      - name: Clone prod repo
        if: steps.version.outputs.has_version == 'true'
        env:
          GH_TOKEN: ${{ secrets.SDK_WRITE_TOKEN }}
        run: |
          git clone https://x-access-token:${GH_TOKEN}@github.com/team-telnyx/telnyx-php.git prod-repo
          cd prod-repo
          git checkout next
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Sync staging tree → prod next
        if: steps.version.outputs.has_version == 'true'
        working-directory: prod-repo
        run: |
          # Remove all tracked files from prod's working tree
          git rm -rf . 2>/dev/null || true

          # Copy entire staging tree into prod (excluding .git and prod-repo itself)
          rsync -a --exclude='.git' --exclude='prod-repo' "$GITHUB_WORKSPACE/" .

          # ── Restore prod-owned files ──────────────────────────────────
          #
          # These files exist on both staging and prod but have DIFFERENT
          # content. The staging version is tailored for the staging repo
          # (different triggers, runners, actions, config). The prod version
          # must be preserved as-is.
          #
          # Key differences:
          #   release-please.yml: staging = removed (staging doesn't need it);
          #                       prod = two-phase trigger on next + master
          #   ci.yml:             staging = ubuntu-latest, simpler jobs;
          #                       prod = full test/publish jobs
          #   release-doctor.yml: staging = checks stale secrets;
          #                       prod = webhook verification, no secret checks
          #   release-please-config.json: staging has prerelease + versioning:prerelease;
          #                               prod does not
          #   bin/check-release-environment: staging = no-op;
          #                                  prod = no-op (webhook handles publishing)
          #
          # Strategy: restore from prod's branches. Most files are restored
          # from `next` (prod's current HEAD). However, release-please.yml
          # only exists on `master` (it is never committed to `next` because
          # staging doesn't have it and the restore-from-next silently fails).
          # We fetch origin/master and restore release-please.yml from there.
          git fetch origin master:refs/remotes/origin/master 2>/dev/null || true

          # Restore prod-owned files from origin/master
          #
          # IMPORTANT: All prod-owned files must be restored from origin/master,
          # NOT from `next`. During promote, the staging tree fully replaces
          # `next`, so `next` no longer has prod-owned files. `master` is the
          # source of truth for prod-owned files (it's where release-please
          # merges release PRs).
          #
          # release-please.yml: only exists on master (staging doesn't have it)
          # release-please-config.json: staging doesn't have it; master has the
          #   correct version (no prerelease/versioning:prerelease)
          # ci.yml, release-doctor.yml, bin/check-release-environment: prod
          #   versions differ from staging
          # .release-please-manifest.json: master has the latest released version
          git checkout origin/master -- \
            .github/workflows/release-please.yml \
            .github/workflows/ci.yml \
            .github/workflows/release-doctor.yml \
            release-please-config.json \
            .release-please-manifest.json \
            bin/check-release-environment \
            2>/dev/null || true

      - name: Commit and push to prod next
        if: steps.version.outputs.has_version == 'true'
        working-directory: prod-repo
        env:
          NEXT_VERSION: ${{ steps.version.outputs.version }}
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to promote — prod next is already up to date"
            exit 0
          fi

          git commit -m "chore: promote from staging ${GITHUB_SHA:0:7}" -m "Release-As: ${NEXT_VERSION}"
          git push origin next

          echo "✅ Promoted to prod next with Release-As: ${NEXT_VERSION}"
